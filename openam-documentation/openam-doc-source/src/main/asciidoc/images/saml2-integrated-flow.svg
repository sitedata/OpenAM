.698" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="133">OpenAM SAML v2.0</text><text x="193" y="70.995" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="110">Service Provider</text><rect style="stroke:#a80036;stroke-width:1.5" width="124" height="46.594" x="456" y="34.703" fill="#FEFECE" filter="url(#fhmr31x)"/><text x="483" y="54.698" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="70">SAML v2.0</text><text x="463" y="70.995" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacingAndGlyphs" textLength="110">Identity Provider</text><polygon fill="#A80036" points="238 113.297 248 117.297 238 121.297 242 117.297" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="42" x2="244" y1="117.297" y2="117.297"/><text x="49" y="112.364" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">1.</text><text x="67" y="112.364" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="139">Initiate authentication</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="176.828" y2="176.828"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="176.828" y2="189.828"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="189.828" y2="189.828"/><polygon fill="#A80036" points="261 185.828 251 189.828 261 193.828 257 189.828" style="stroke:#a80036;stroke-width:1"/><text x="257" y="156.629" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">2.</text><text x="275" y="141.497" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="177">Execute any modules in the</text><text x="275" y="156.629" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="160">authentication chain that</text><text x="275" y="171.762" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="177">precede the SAML2 module</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="234.094" y2="234.094"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="234.094" y2="247.094"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="247.094" y2="247.094"/><polygon fill="#A80036" points="261 243.094 251 247.094 261 251.094 257 247.094" style="stroke:#a80036;stroke-width:1"/><text x="257" y="221.461" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">3.</text><text x="275" y="213.895" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="124">Execute the SAML2</text><text x="275" y="229.028" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="144">authentication module</text><rect style="stroke:#eee;stroke-width:1" width="657" height="3" x="3" y="275.66" fill="#EEE" filter="url(#fhmr31x)"/><line style="stroke:#000;stroke-width:1" x1="3" x2="660" y1="275.66" y2="275.66"/><line style="stroke:#000;stroke-width:1" x1="3" x2="660" y1="278.66" y2="278.66"/><rect style="stroke:#000;stroke-width:2" width="287" height="23.133" x="188" y="265.094" fill="#EEE" filter="url(#fhmr31x)"/><text x="194" y="281.161" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="268">SAML2 authentication module starts</text><polygon fill="#A80036" points="508 315.227 518 319.227 508 323.227 512 319.227" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="250" x2="514" y1="319.227" y2="319.227"/><text x="257" y="314.293" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">4.</text><text x="275" y="314.293" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="115">Request assertion</text><rect style="stroke:#000;stroke-width:2" width="637" height="132.664" x="13" y="334.359" fill="none"/><polygon fill="#EEE" points="13 334.359 380 334.359 380 341.359 370 351.359 13 351.359 13 334.359" style="stroke:#000;stroke-width:2"/><text x="28" y="347.426" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="322">If the user needs to authenticate to the IdP</text><polygon fill="#A80036" points="53 368.492 43 372.492 53 376.492 49 372.492" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="47" x2="519" y1="372.492" y2="372.492"/><text x="59" y="367.559" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">5.</text><text x="77" y="367.559" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="126">Request credentials</text><polygon fill="#A80036" points="508 397.625 518 401.625 508 405.625 512 401.625" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="42" x2="514" y1="401.625" y2="401.625"/><text x="49" y="396.692" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">6.</text><text x="67" y="396.692" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="121">Provide credentials</text><line style="stroke:#a80036;stroke-width:1" x1="520" x2="562" y1="446.023" y2="446.023"/><line style="stroke:#a80036;stroke-width:1" x1="562" x2="562" y1="446.023" y2="459.023"/><line style="stroke:#a80036;stroke-width:1" x1="521" x2="562" y1="459.023" y2="459.023"/><polygon fill="#A80036" points="531 455.023 521 459.023 531 463.023 527 459.023" style="stroke:#a80036;stroke-width:1"/><text x="527" y="433.391" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">7.</text><text x="545" y="425.825" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="93">Authentication</text><text x="545" y="440.957" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="66">successful</text><polygon fill="#A80036" points="261 491.023 251 495.023 261 499.023 257 495.023" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="255" x2="519" y1="495.023" y2="495.023"/><text x="267" y="490.09" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">8.</text><text x="285" y="490.09" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="105">Return assertion</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="554.555" y2="554.555"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="554.555" y2="567.555"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="567.555" y2="567.555"/><polygon fill="#A80036" points="261 563.555 251 567.555 261 571.555 257 567.555" style="stroke:#a80036;stroke-width:1"/><text x="257" y="534.356" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="14">9.</text><text x="275" y="519.223" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="169">Attempt to access user by</text><text x="275" y="534.356" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="151">searching for persistent</text><text x="275" y="549.489" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="170">name ID (in SP data store)</text><rect style="stroke:#000;stroke-width:2" width="443" height="246.477" x="164.5" y="582.555" fill="none"/><polygon fill="#EEE" points="164.5 582.555 576.5 582.555 576.5 589.555 566.5 599.555 164.5 599.555 164.5 582.555" style="stroke:#000;stroke-width:2"/><text x="179.5" y="595.622" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="367">If the name ID for the user is not found on the SP</text><line style="stroke:#000;stroke-width:1;stroke-dasharray:2,2" x1="164.5" x2="607.5" y1="600.688" y2="600.688"/><text x="169.5" y="610.898" fill="#000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="393">[If dynamic profile creation and auto-federation are enabled]</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="665.891" y2="665.891"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="665.891" y2="678.891"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="678.891" y2="678.891"/><polygon fill="#A80036" points="261 674.891 251 678.891 261 682.891 257 678.891" style="stroke:#a80036;stroke-width:1"/><text x="257" y="645.692" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="23">10.</text><text x="284" y="630.559" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="170">Create the user on the SP,</text><text x="284" y="645.692" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="190">including the persistent name</text><text x="284" y="660.825" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="128">ID in the user profile</text><line style="stroke:#000;stroke-width:1;stroke-dasharray:2,2" x1="164.5" x2="607.5" y1="687.891" y2="687.891"/><text x="169.5" y="698.101" fill="#000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="417">[If dynamic profile creation and auto-federation are not enabled,</text><text x="169.5" y="710.906" fill="#000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="438">and if a linking chain exists, and if the name ID format is persistent]</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="750.766" y2="750.766"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="750.766" y2="763.766"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="763.766" y2="763.766"/><polygon fill="#A80036" points="261 759.766 251 763.766 261 767.766 257 763.766" style="stroke:#a80036;stroke-width:1"/><text x="257" y="738.133" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="23">11.</text><text x="284" y="730.567" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="165">Invoke the linking chain to</text><text x="284" y="745.7" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="204">authenticate the user on the SP</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="808.031" y2="808.031"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="808.031" y2="821.031"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="821.031" y2="821.031"/><polygon fill="#A80036" points="261 817.031 251 821.031 261 825.031 257 821.031" style="stroke:#a80036;stroke-width:1"/><text x="257" y="795.399" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="23">12.</text><text x="284" y="787.832" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="198">Write the persistent name ID in</text><text x="284" y="802.965" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="96">the user profile</text><rect style="stroke:#eee;stroke-width:1" width="657" height="3" x="3" y="856.598" fill="#EEE" filter="url(#fhmr31x)"/><line style="stroke:#000;stroke-width:1" x1="3" x2="660" y1="856.598" y2="856.598"/><line style="stroke:#000;stroke-width:1" x1="3" x2="660" y1="859.598" y2="859.598"/><rect style="stroke:#000;stroke-width:2" width="330" height="23.133" x="166.5" y="846.031" fill="#EEE" filter="url(#fhmr31x)"/><text x="172.5" y="862.098" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="311">SAML2 authentication module is complete</text><line style="stroke:#a80036;stroke-width:1" x1="250" x2="292" y1="915.43" y2="915.43"/><line style="stroke:#a80036;stroke-width:1" x1="292" x2="292" y1="915.43" y2="928.43"/><line style="stroke:#a80036;stroke-width:1" x1="251" x2="292" y1="928.43" y2="928.43"/><polygon fill="#A80036" points="261 924.43 251 928.43 261 932.43 257 928.43" style="stroke:#a80036;stroke-width:1"/><text x="257" y="902.797" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="23">13.</text><text x="284" y="895.231" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="215">Execute remaining authentication</text><text x="284" y="910.364" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="229">modules in the authentication chain</text><polygon fill="#A80036" points="53 953.43 43 957.43 53 961.43 49 957.43" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="47" x2="249" y1="957.43" y2="957.43"/><text x="59" y="952.497" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="23">14.</text><text x="86" y="952.497" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="157">Authentication complete</text></g></svg>