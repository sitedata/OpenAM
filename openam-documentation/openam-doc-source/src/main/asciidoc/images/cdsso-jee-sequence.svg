00" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="89">and redirect...</text><polygon fill="#FBFB77" points="50 192.258 50 247.258 332 247.258 332 202.258 322 192.258 50 192.258" filter="url(#fld92mn)" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="322" x2="322" y1="192.258" y2="202.258"/><line style="stroke:#a80036;stroke-width:1" x1="332" x2="322" y1="202.258" y2="202.258"/><text x="56" y="209.325" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="261">The amFilterCDSSORequest cookie holds</text><text x="56" y="224.458" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="254">information consumed when processing</text><text x="56" y="239.59" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="163">the form submitted in 15.</text><polygon fill="#A80036" points="432 273.656 442 277.656 432 281.656 436 277.656" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="45.5" x2="438" y1="277.656" y2="277.656"/><text x="52.5" y="272.723" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="9">3</text><text x="65.5" y="272.723" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="106">...to CDCServlet.</text><polygon fill="#A80036" points="667 317.789 677 321.789 667 325.789 671 321.789" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="444" x2="673" y1="321.789" y2="321.789"/><text x="451" y="309.422" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="9">4</text><text x="464" y="301.856" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="197">If browser presents SSO token,</text><text x="464" y="316.989" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="190">request SSO token validation.</text><polygon fill="#A80036" points="455 362.055 445 366.055 455 370.055 451 366.055" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="449" x2="678" y1="366.055" y2="366.055"/><text x="461" y="353.688" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="9">5</text><text x="474" y="346.122" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="130">If SSO token is valid,</text><text x="474" y="361.254" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="145">skip to 14. Otherwise...</text><polygon fill="#A80036" points="56.5 391.32 46.5 395.32 56.5 399.32 52.5 395.32" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="50.5" x2="443" y1="395.32" y2="395.32"/><text x="62.5" y="390.387" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="9">6</text><text x="75.5" y="390.387" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="64">Redirect...</text><polygon fill="#A80036" points="825 420.453 835 424.453 825 428.453 829 424.453" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="45.5" x2="831" y1="424.453" y2="424.453"/><text x="52.5" y="419.52" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="9">7</text><text x="65.5" y="419.52" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="204">...to OpenAM for authentication.</text><polygon fill="#A80036" points="56.5 449.586 46.5 453.586 56.5 457.586 52.5 453.586" style="stroke:#a80036;stroke-width:1"/><line style=