0" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="106">...to CDCServlet.</text><polygon fill="#A80036" points="667 581.25 677 585.25 667 589.25 671 585.25" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="444" x2="673" y1="585.25" y2="585.25"/><text x="451" y="580.317" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">12</text><text x="473" y="580.317" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="189">Request SSO token validation</text><polygon fill="#A80036" points="455 610.383 445 614.383 455 618.383 451 614.383" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="449" x2="678" y1="614.383" y2="614.383"/><text x="461" y="609.45" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">13</text><text x="483" y="609.45" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="119">SSO token is valid.</text><polygon fill="#A80036" points="56.5 654.516 46.5 658.516 56.5 662.516 52.5 658.516" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="50.5" x2="443" y1="658.516" y2="658.516"/><text x="62.5" y="646.149" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">14</text><text x="84.5" y="638.582" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="195">Send self-submitting form with</text><text x="84.5" y="653.715" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="212">Liberty AuthN Response (LARES).</text><polygon fill="#A80036" points="325.5 713.781 335.5 717.781 325.5 721.781 329.5 717.781" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="45.5" x2="331.5" y1="717.781" y2="717.781"/><text x="52.5" y="697.981" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">15</text><text x="74.5" y="682.848" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="197">Form POSTs automatically to a</text><text x="74.5" y="697.981" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="167">policy agent endpoint that</text><text x="74.5" y="713.114" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="158">consumes the response.</text><polygon fill="#FBFB77" points="50 731.18 50 786.18 359 786.18 359 741.18 349 731.18 50 731.18" filter="url(#fld92mn)" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="349" x2="349" y1="731.18" y2="741.18"/><line style="stroke:#a80036;stroke-width:1" x1="359" x2="349" y1="741.18" y2="741.18"/><text x="56" y="748.247" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="288">Policy agent extracts SSO token from LARES,</text><text x="56" y="763.379" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="274">Sets cookie domain to full URL of resource,</text><text x="56" y="778.512" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="174">Validates LARES attributes.</text><polygon fill="#A80036" points="56.5 827.578 46.5 831.578 56.5 835.578 52.5 831.578" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="50.5" x2="336.5" y1="831.578" y2="831.578"/><text x="62.5" y="819.211" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">16</text><text x="84.5" y="811.645" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="224">Redirect, with request to delete the</text><text x="84.5" y="826.778" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="208">amFilterCDSSORequest cookie...</text><polygon fill="#A80036" points="325.5 856.844 335.5 860.844 325.5 864.844 329.5 860.844" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="45.5" x2="331.5" y1="860.844" y2="860.844"/><text x="52.5" y="855.911" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">17</text><text x="74.5" y="855.911" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="155">...to protected resource.</text><polygon fill="#A80036" points="667 885.977 677 889.977 667 893.977 671 889.977" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="337.5" x2="673" y1="889.977" y2="889.977"/><text x="344.5" y="885.043" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">18</text><text x="366.5" y="885.043" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="189">Request SSO token validation</text><polygon fill="#A80036" points="348.5 915.109 338.5 919.109 348.5 923.109 344.5 919.109" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="342.5" x2="678" y1="919.109" y2="919.109"/><text x="354.5" y="914.176" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">19</text><text x="376.5" y="914.176" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="220">Response for SSO token validation</text><polygon fill="#A80036" points="667 944.242 677 948.242 667 952.242 671 948.242" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="337.5" x2="673" y1="948.242" y2="948.242"/><text x="344.5" y="943.309" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">20</text><text x="366.5" y="943.309" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="148">Request policy decision</text><polygon fill="#A80036" points="348.5 973.375 338.5 977.375 348.5 981.375 344.5 977.375" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="342.5" x2="678" y1="977.375" y2="977.375"/><text x="354.5" y="972.442" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">21</text><text x="376.5" y="972.442" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="179">Response for policy decision</text><polygon fill="#A80036" points="56.5 1017.508 46.5 1021.508 56.5 1025.508 52.5 1021.508" style="stroke:#a80036;stroke-width:1"/><line style="stroke:#a80036;stroke-width:1" x1="50.5" x2="336.5" y1="1021.508" y2="1021.508"/><text x="62.5" y="1009.141" fill="#000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="18">22</text><text x="84.5" y="1001.575" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="202">Allow access &amp; return resource,</text><text x="84.5" y="1016.707" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="222">or deny access &amp; return HTTP 403.</text></g></svg>